version: "3.9"

services:
  jwt-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jwt-api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_SECONDS=300
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - ./backend:/app
    networks:
      - jwt-network

networks:
  jwt-network:
    driver: bridge
